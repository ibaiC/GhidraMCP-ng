name: Auto Release on Version Bump

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pom.xml'  # Trigger when pom.xml is modified

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # Need at least 2 commits to compare

    - name: Check version change
      id: version-check
      run: |
        # Get current version from pom.xml
        CURRENT_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
        echo "Current version: $CURRENT_VERSION"

        # Get previous version from pom.xml in the previous commit
        PREVIOUS_VERSION=$(git show HEAD~1:pom.xml | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
        echo "Previous version: $PREVIOUS_VERSION"

        # Check if version changed and is not a SNAPSHOT
        if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [[ ! "$CURRENT_VERSION" =~ SNAPSHOT ]]; then
          echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        else
          echo "Version unchanged or is SNAPSHOT, no release needed"
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

  create-auto-release:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GHIDRA_VERSION: 12.0.4
      GHIDRA_DATE: 20260303

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Download Ghidra
      run: |
        echo "Downloading Ghidra ${{ env.GHIDRA_VERSION }}..."
        wget --no-verbose -O ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${{ env.GHIDRA_VERSION }}_build/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC_${{ env.GHIDRA_DATE }}.zip
        7z x -bd ghidra.zip

    - name: Install Ghidra JARs to Maven local repository
      run: |
        GHIDRA_DIR="ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC"
        GV="${{ env.GHIDRA_VERSION }}"
        echo "Installing Ghidra JARs from ${GHIDRA_DIR}..."

        # Framework JARs
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Generic/lib/Generic.jar"           -DgroupId=ghidra -DartifactId=Generic           -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/SoftwareModeling/lib/SoftwareModeling.jar" -DgroupId=ghidra -DartifactId=SoftwareModeling -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Project/lib/Project.jar"           -DgroupId=ghidra -DartifactId=Project           -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Docking/lib/Docking.jar"           -DgroupId=ghidra -DartifactId=Docking           -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Utility/lib/Utility.jar"           -DgroupId=ghidra -DartifactId=Utility           -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Gui/lib/Gui.jar"                   -DgroupId=ghidra -DartifactId=Gui               -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/FileSystem/lib/FileSystem.jar"     -DgroupId=ghidra -DartifactId=FileSystem         -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Graph/lib/Graph.jar"               -DgroupId=ghidra -DartifactId=Graph              -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/DB/lib/DB.jar"                     -DgroupId=ghidra -DartifactId=DB                 -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Emulation/lib/Emulation.jar"       -DgroupId=ghidra -DartifactId=Emulation          -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Framework/Help/lib/Help.jar"                 -DgroupId=ghidra -DartifactId=Help               -Dversion=${GV} -Dpackaging=jar

        # Feature JARs
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Features/Base/lib/Base.jar"                  -DgroupId=ghidra -DartifactId=Base               -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Features/Decompiler/lib/Decompiler.jar"      -DgroupId=ghidra -DartifactId=Decompiler         -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Features/PDB/lib/PDB.jar"                    -DgroupId=ghidra -DartifactId=PDB                -Dversion=${GV} -Dpackaging=jar
        mvn -q install:install-file -Dfile="${GHIDRA_DIR}/Ghidra/Features/FunctionID/lib/FunctionID.jar"      -DgroupId=ghidra -DartifactId=FunctionID         -Dversion=${GV} -Dpackaging=jar

        echo "Installed 15 Ghidra JARs to Maven local repository"

    - name: Build with Maven
      run: |
        echo "Building GhidraMCP..."
        mvn clean package assembly:single -DskipTests
        echo "Build complete."
        ls -la target/GhidraMCP-*.zip 2>/dev/null || ls -la target/*.zip

    - name: Create and push tag
      run: |
        VERSION="${{ needs.check-version.outputs.new-version }}"
        TAG="v${VERSION}"

        # Check if tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists, skipping tag creation"
        else
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Auto-release version $VERSION"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
        fi

    - name: Prepare release artifacts
      run: |
        VERSION="${{ needs.check-version.outputs.new-version }}"
        echo "Preparing release artifacts for version $VERSION..."
        mkdir -p release

        # Copy main plugin ZIP
        if [ -f "target/GhidraMCP-${VERSION}.zip" ]; then
          cp target/GhidraMCP-${VERSION}.zip release/
        else
          ZIP_FILE=$(find target/ -name "GhidraMCP-*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            cp "$ZIP_FILE" release/GhidraMCP-${VERSION}.zip
          else
            echo "ERROR: No zip file found in target directory!"
            exit 1
          fi
        fi

        # Copy essential files
        cp bridge_mcp_ghidra.py release/
        cp requirements.txt release/
        cp README.md release/
        [ -f LICENSE ] && cp LICENSE release/

        # Dynamic tool count
        BRIDGE_TOOLS=$(grep -c '^@mcp\.tool()' bridge_mcp_ghidra.py 2>/dev/null || echo 0)
        SERVICE_TOOLS=$(grep -h '@McpTool' src/main/java/com/xebyte/core/*Service.java 2>/dev/null | wc -l)
        MCP_TOOLS=$((BRIDGE_TOOLS + SERVICE_TOOLS))

        cat > release/INSTALLATION.md << INSTEOF
        # GhidraMCP ${VERSION} Installation

        ## Quick Start
        1. In Ghidra: **File > Install Extensions > Add** and select GhidraMCP-${VERSION}.zip
        2. Restart Ghidra, enable plugin: **File > Configure > Configure All Plugins > GhidraMCP**
        3. Install Python dependencies: \`pip install -r requirements.txt\`
        4. Run: \`python bridge_mcp_ghidra.py\`

        ## What's Included
        - GhidraMCP-${VERSION}.zip - Ghidra extension
        - bridge_mcp_ghidra.py - MCP server with ${MCP_TOOLS} tools
        - requirements.txt - Python dependencies

        For complete documentation, see [README](https://github.com/ibaiC/GhidraMCP-ng#readme).
        INSTEOF

        echo "Release artifacts:"
        ls -la release/

    - name: Generate release notes
      run: |
        VERSION="${{ needs.check-version.outputs.new-version }}"
        BRIDGE_TOOLS=$(grep -c '^@mcp\.tool()' bridge_mcp_ghidra.py 2>/dev/null || echo 0)
        SERVICE_TOOLS=$(grep -h '@McpTool' src/main/java/com/xebyte/core/*Service.java 2>/dev/null | wc -l)
        MCP_TOOLS=$((BRIDGE_TOOLS + SERVICE_TOOLS))
        GUI_DIRECT=$(grep -c 'createContext(' src/main/java/com/xebyte/GhidraMCPPlugin.java 2>/dev/null || echo 0)
        HEADLESS_DIRECT=$(grep -c 'createContext(' src/main/java/com/xebyte/headless/GhidraMCPHeadlessServer.java 2>/dev/null || echo 0)
        REGISTRY=$(grep -cE '(get|post)\(\s*"/' src/main/java/com/xebyte/core/EndpointRegistry.java 2>/dev/null || echo 0)
        GUI_EPS=$((GUI_DIRECT + REGISTRY))
        HEADLESS_EPS=$((HEADLESS_DIRECT + REGISTRY))

        # Get commits since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

        cat > release_notes.md << GENEOF
        # GhidraMCP ${VERSION}

        Production-ready Model Context Protocol server for Ghidra reverse engineering platform.

        ## By the Numbers

        | Metric | Value |
        |--------|-------|
        | **MCP Tools** | ${MCP_TOOLS} |
        | **GUI Endpoints** | ${GUI_EPS} |
        | **Headless Endpoints** | ${HEADLESS_EPS} |
        | **Java** | 21 LTS |
        | **Ghidra** | ${{ env.GHIDRA_VERSION }} |

        ## Installation

        1. Download **GhidraMCP-${VERSION}.zip** below
        2. In Ghidra: **File > Install Extensions > Add** and select the ZIP
        3. Restart Ghidra, enable plugin: **File > Configure > Configure All Plugins > GhidraMCP**
        4. Install Python bridge: \`pip install -r requirements.txt\`
        5. Run: \`python bridge_mcp_ghidra.py\`

        See [CHANGELOG.md](https://github.com/ibaiC/GhidraMCP-ng/blob/main/CHANGELOG.md) for detailed release notes.

        ## Recent Changes

        GENEOF

        if [ -n "$LAST_TAG" ]; then
          git log --oneline --no-merges ${LAST_TAG}..HEAD >> release_notes.md
        else
          echo "Initial release" >> release_notes.md
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ needs.check-version.outputs.new-version }}"
        name: "GhidraMCP ${{ needs.check-version.outputs.new-version }}"
        body_path: release_notes.md
        files: |
          release/*
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Auto-release summary
      run: |
        VERSION="${{ needs.check-version.outputs.new-version }}"
        BRIDGE_TOOLS=$(grep -c '^@mcp\.tool()' bridge_mcp_ghidra.py 2>/dev/null || echo 0)
        SERVICE_TOOLS=$(grep -h '@McpTool' src/main/java/com/xebyte/core/*Service.java 2>/dev/null | wc -l)
        MCP_TOOLS=$((BRIDGE_TOOLS + SERVICE_TOOLS))
        echo "## Auto-Release Created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
        echo "**MCP Tools:** $MCP_TOOLS" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** Version bump detected in pom.xml" >> $GITHUB_STEP_SUMMARY
        echo "**Tag:** v$VERSION" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[Download Release](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
